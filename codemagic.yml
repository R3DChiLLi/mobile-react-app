workflows:
  android-release:
    name: Android Firebase Distribution
    max_build_duration: 60
    environment:
      android_signing:
        - my_keystore
      vars:
        PACKAGE_NAME: "com.zahan.todolist"  # 👈 replace with your actual package name from app.json
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform android --clean
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        android:
          app_id: $FIREBASE_APP_ID
          groups:
            - testers